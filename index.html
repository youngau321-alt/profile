<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์นักศึกษา - ยอง อู ชอย </title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .profile-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
        }
        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #0056b3;
            margin-bottom: 20px;
        }
        .name {
            font-size: 24px;
            font-weight: bold;
            color: #333333;
            margin: 0 0 5px 0;
        }
        .student-id {
            font-size: 16px;
            color: #666666;
            margin-bottom: 20px;
        }
        .info-container {
            text-align: left;
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #eeeeee;
        }
        .info-item {
            margin-bottom: 12px;
            font-size: 16px;
            color: #444444;
            line-height: 1.5;
        }
        .info-item:last-child {
            margin-bottom: 0;
        }
        .info-item strong {
            color: #111111;
            display: inline-block;
            width: 110px;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="profile.png.jpg" alt="รูปโปรไฟล์ของ ยอง อู" class="profile-pic">
        
        <h1 class="name">ยอง อู ชอย</h1>
        <div class="student-id">รหัสนักศึกษา: 694245021</div>
        
        <div class="info-container">
            <div class="info-item">
                <strong>เบอร์โทรศัพท์:</strong> 061-507-1476
            </div>
            <div class="info-item">
                <strong>อีเมล:</strong> <a href="youngau321@gmail.com" style="color: #0056b3; text-decoration: none;">youngau321@gmail.com</a>
            </div>
            <div class="info-item">
                <strong>สาขาวิชา:</strong> วิทยาการคอมพิวเตอร์
            </div>
            <div class="info-item">
                <strong>คณะ:</strong> คณะวิทยาศาสตร์และเทคโนโลยี
            </div>
            <div class="info-item">
                <strong>มหาวิทยาลัย:</strong> มหาวิทยาลัยราชภัฏหมู่บ้านจอมบึง
            </div>
        </div>
    </div>

</body>
</html>
